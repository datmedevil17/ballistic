<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#020408"/>
  <!-- outer ring -->
  <circle cx="32" cy="32" r="26" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- crosshair lines -->
  <line x1="32" y1="6" x2="32" y2="18" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="58" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="18" y2="32" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="58" y2="32" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <!-- ship (triangle pointing up) -->
  <polygon points="32,14 40,44 32,38 24,44" fill="#06b6d4" opacity="0.9"/>
  <!-- engine glow -->
  <ellipse cx="32" cy="44" rx="4" ry="2.5" fill="#8b5cf6" opacity="0.8"/>
  <!-- center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#06b6d4"/>
</svg>
